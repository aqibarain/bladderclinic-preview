        async function submitContactForm(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('form-submit-btn');
            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            const payload = {
                access_key: document.getElementById('form-access-key').value,
                name: document.getElementById('form-name').value,
                email: document.getElementById('form-email').value,
                phone: document.getElementById('form-phone').value,
                message: document.getElementById('form-message').value
            };

            try {
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    window.location.hash = '#/';
                    const banner = document.getElementById('success-banner');
                    banner.classList.remove('hidden');
                    setTimeout(() => { banner.classList.add('hidden'); }, 4000);
                } else {
                    alert("Submission configuration error. Please verify API fields.");
                }
            } catch (error) {
                console.error("Form transmission failed:", error);
                alert("Network connectivity issue. Please try again.");
            } finally {
                if (document.getElementById('form-submit-btn')) {
                    submitBtn.innerText = "Send Message Request";
                    submitBtn.disabled = false;
                }
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
        function closeMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.add('hidden');
        }
    </script>

                        <p class="text-clinicCharcoal mt-2 text-sm sm:text-base opacity-85">Reach out below to submit a message to our reception desk or locate our facility in Mount Hawthorn.</p>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-start">
                        <div class="lg:col-span-5 space-y-6 sm:space-y-8">
                            <div class="bg-white p-6 rounded-2xl border border-clinicSage/20 shadow-sm space-y-4">
                                <h3 class="text-lg font-bold text-clinicTerracotta border-b border-clinicCream pb-2">Clinic Operations</h3>
                                <div>
                                    <span class="block text-xs font-bold uppercase text-clinicSage">Street Address</span>
                                    <span class="text-sm font-semibold text-clinicCharcoal">249 Scarborough Beach Rd, Mount Hawthorn WA 6016</span>
                                </div>
                                <div>
                                    <span class="block text-xs font-bold uppercase text-clinicSage">Communication Channels</span>
                                    <span class="text-sm block font-bold text-clinicTerracotta">Phone: 08 6555 6516</span>
                                    <span class="text-sm block text-clinicCharcoal opacity-90">Email: emailus@bladder-clinic.com</span>
                                </div>
                                <div>
                                    <span class="block text-xs font-bold uppercase text-clinicSage">Standard Consulting Hours</span>
                                    <span class="text-sm block text-clinicCharcoal">Monday to Friday: 9:00 AM – 4:00 PM</span>
                                    <span class="text-sm block text-slate-400">Saturday, Sunday & Public Holidays: Closed</span>
                                </div>
                            </div>
                            
                            <div class="w-full h-64 sm:h-80 rounded-2xl overflow-hidden shadow-sm border border-clinicSage/20 bg-white">
                                <iframe src="https://maps.google.com/maps?q=249%20Scarborough%20Beach%20Rd,%20Mount%20Hawthorn%20WA%206016&t=&z=15&ie=UTF-8&iwloc=&output=embed" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                            </div>
                        </div>

                        <div class="lg:col-span-7">
                            <form onsubmit="submitContactForm(event)" class="space-y-6 bg-white p-6 sm:p-8 rounded-2xl border border-clinicSage/20 shadow-sm">
                                <input type="hidden" id="form-access-key" value="YOUR_WEB3FORMS_ACCESS_KEY_HERE">
                                <div>
                                    <label class="block text-sm font-semibold text-clinicCharcoal mb-2">Patient Full Name</label>
                                    <input type="text" id="form-name" required class="w-full px-4 py-2.5 rounded-lg border border-clinicCream bg-clinicCream/30 focus:outline-none focus:border-clinicTerracotta text-clinicCharcoal transition" placeholder="John Doe">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-clinicCharcoal mb-2">Email Address</label>
                                    <input type="email" id="form-email" required class="w-full px-4 py-2.5 rounded-lg border border-clinicCream bg-clinicCream/30 focus:outline-none focus:border-clinicTerracotta text-clinicCharcoal transition" placeholder="john@example.com">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-clinicCharcoal mb-2">Contact Number</label>
                                    <input type="number" id="form-phone" required class="w-full px-4 py-2.5 rounded-lg border border-clinicCream bg-clinicCream/30 focus:outline-none focus:border-clinicTerracotta text-clinicCharcoal transition" placeholder="0412345678">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-clinicCharcoal mb-2">Message Note</label>
                                    <textarea id="form-message" rows="4" required class="w-full px-4 py-2.5 rounded-lg border border-clinicCream bg-clinicCream/30 focus:outline-none focus:border-clinicTerracotta text-clinicCharcoal transition" placeholder="Please outline details..."></textarea>
                                </div>
                                <button type="submit" id="form-submit-btn" class="w-full bg-clinicTerracotta text-white py-3 rounded-lg font-bold hover:bg-clinicTerracotta/90 transition shadow-sm">Send Message Request</button>
                            </form>
                        </div>
                    </div>
                </section>
            `
        };

        function router() {
            let hash = window.location.hash || '#/';
            if (!routes[hash]) { hash = '#/'; }

            const container = document.getElementById('app-view');
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');
            container.innerHTML = routes[hash];

if (hash === '#/doctors') {
                const grid = document.getElementById('doctors-grid');
                
                grid.innerHTML = clinicDoctors.map(doc => `
                    <div class="bg-white rounded-2xl border border-clinicSage/20 p-6 sm:p-8 shadow-sm flex flex-col md:flex-row gap-6 items-start hover:bg-clinicRose/10 transition duration-300">
                        
                        <div class="w-full md:w-32 h-42 rounded-xl overflow-hidden bg-clinicCream border border-clinicSage/20 shadow-inner shrink-0 flex items-center justify-center">
                            ${doc.image ? `
                                <img src="${doc.image}" alt="${doc.name}" class="w-full h-full object-cover">
                            ` : `
                                <span class="text-[10px] font-bold text-clinicSage tracking-wider uppercase text-center p-2">Photo Coming Soon</span>
                            `}
                        </div>
                        
                        <div class="flex-grow w-full space-y-2">
                            <div>
                                <span class="text-xs font-bold uppercase tracking-wider text-clinicSage">${doc.title}</span>
                                <h3 class="text-2xl font-bold text-clinicTerracotta mt-0.5">${doc.name}</h3>
                                <p class="text-xs font-semibold text-clinicCharcoal/60">${doc.degrees}</p>
                            </div>
                            
                            <p class="text-sm text-clinicCharcoal/90 leading-relaxed pt-1">
                                ${doc.description}
                            </p>
                            
                            <div class="pt-2 flex flex-wrap gap-1.5">
                                ${doc.specialties.map(spec => `<span class="text-[10px] bg-clinicCream border border-clinicSage/20 text-clinicCharcoal font-semibold px-2.5 py-1 rounded-md shadow-sm">${spec}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            document.querySelectorAll('#spa-nav a').forEach(navLink => {
                if (navLink.getAttribute('href') === hash) {
                    navLink.className = "px-4 py-1.5 rounded-full text-sm font-bold transition text-clinicCharcoal bg-clinicCream shadow-sm";
                } else {
                    navLink.className = "px-4 py-1.5 rounded-full text-sm font-bold transition text-white hover:text-clinicCream";
                }
            });

            document.querySelectorAll('#spa-nav-mobile a').forEach(navLink => {
                if (navLink.getAttribute('href') === hash) {
                    navLink.className = "px-4 py-3 rounded-xl text-sm font-bold transition text-white bg-clinicTerracotta shadow-sm";
                } else {
                    navLink.className = "px-4 py-3 rounded-xl text-sm font-bold transition text-clinicCharcoal hover:bg-clinicRose/20";
                }
            });
        }

        window.addEventListener("hashchange", router);
        document.addEventListener("DOMContentLoaded", router);
    </script>
</body>
</html>

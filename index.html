<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bladder Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clinicHeader: '#b1c4d4', 
                        clinicMain: '#e3ebe5',   
                        clinicButton: '#b1c4d4', 
                        clinicDarkText: '#0f172a', 
                    }
                }
            }
        }
        
        async function submitContactForm(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('form-submit-btn');
            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            const payload = {
                access_key: document.getElementById('form-access-key').value,
                name: document.getElementById('form-name').value,
                email: document.getElementById('form-email').value,
                phone: document.getElementById('form-phone').value,
                message: document.getElementById('form-message').value
            };

            try {
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    window.location.hash = '#/';
                    
                    const banner = document.getElementById('success-banner');
                    banner.classList.remove('hidden');
                    
                    setTimeout(() => {
                        banner.classList.add('hidden');
                    }, 4000);
                } else {
                    alert("Submission configuration error. Please verify API fields.");
                }
            } catch (error) {
                console.error("Form transmission failed:", error);
                alert("Network connectivity issue. Please try again.");
            } finally {
                if (document.getElementById('form-submit-btn')) {
                    submitBtn.innerText = "Send Message Request";
                    submitBtn.disabled = false;
                }
            }
        }

        // MOBILE NAVIGATION DRAWER TOGGLES
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
        function closeMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.add('hidden');
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-clinicMain text-clinicDarkText font-sans flex flex-col min-h-screen antialiased">

    <div id="success-banner" class="hidden fixed top-24 left-1/2 transform -translate-x-1/2 z-50 bg-emerald-600 text-white px-6 py-3 rounded-full shadow-2xl flex items-center space-x-2 border border-emerald-500/30 font-medium text-sm transition-all duration-300">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"></path>
        </svg>
        <span>Enquiry sent successfully. We will call you shortly.</span>
    </div>

    <header class="w-full bg-clinicHeader text-clinicDarkText py-4 px-4 md:px-12紧 sticky top-0 z-50 border-b border-slate-300/50 shadow-md">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            
            <a href="#/" onclick="closeMobileMenu()" class="flex items-center space-x-2 md:space-x-3 group">

                    B

            </a>
            
            <nav id="spa-nav" class="hidden md:flex items-center bg-white/60 border border-white/40 rounded-full px-2 py-1.5 backdrop-blur-sm shadow-sm">
                <a href="#/" class="px-4 py-1.5 rounded-full text-sm font-semibold transition">Home</a>
                <a href="#/doctors" class="px-4 py-1.5 rounded-full text-sm font-semibold transition">Doctors</a>
                <a href="#/services" class="px-4 py-1.5 rounded-full text-sm font-semibold transition">Services</a>
                <a href="#/pricing" class="px-4 py-1.5 rounded-full text-sm font-semibold transition">Pricing</a>
                <a href="#/contact" class="px-4 py-1.5 rounded-full text-sm font-semibold transition">Contact</a>
            </nav>
            
            <div class="flex items-center space-x-4">

        <div id="mobile-menu" class="hidden md:hidden mt-4 bg-white/95 rounded-2xl p-4 border border-slate-200 shadow-xl backdrop-blur-md absolute left-4 right-4 top-16 fade-in">
            <nav id="spa-nav-mobile" class="flex flex-col space-y-2">

                <a href="#/doctors" onclick="closeMobileMenu()" class="px-4 py-3 rounded-xl text-sm font-bold transition text-slate-700">Doctors</a>
                <a href="#/services" onclick="closeMobileMenu()" class="px-4 py-3 rounded-xl text-sm font-bold transition text-slate-700">Services</a>
                <a href="#/pricing" onclick="closeMobileMenu()" class="px-4 py-3 rounded-xl text-sm font-bold transition text-slate-700">Pricing</a>
                <a href="#/contact" onclick="closeMobileMenu()" class="px-4 py-3 rounded-xl text-sm font-bold transition text-slate-700">Contact</a>
            </nav>
        </div>
    </header>

    <main id="app-view" class="flex-grow fade-in bg-clinicMain"></main>

            <p class="font-medium w-full md:w-auto">© 2026 The Bladder Clinic. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const clinicDoctors = [

            `,
            '#/doctors': `
                <section class="py-12 px-4 sm:px-6 max-w-6xl mx-auto">
                    <div class="text-center max-w-3xl mx-auto mb-12">
                        <h2 class="text-2xl sm:text-4xl font-extrabold text-clinicDarkText tracking-tight">Our Medical Specialists</h2>
                        <p class="text-slate-600 mt-2 text-sm sm:text-base">Clinicians can be added or removed dynamically from our configuration layout instantly.</p>
                    </div>
                    <div id="doctors-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8"></div>
                </section>
            `,
            '#/services': `
                <section class="py-12 px-4 sm:px-6 max-w-6xl mx-auto">
                    <div class="text-center max-w-3xl mx-auto mb-12">
                        <span class="text-xs font-bold uppercase tracking-widest text-clinicDarkText bg-white px-3 py-1 rounded-full border border-slate-200">Clinical Architecture</span>
                        <h2 class="text-2xl sm:text-4xl font-extrabold text-clinicDarkText tracking-tight mt-3">Multidisciplinary Model of Care</h2>
                        <p class="text-slate-600 mt-2 text-sm sm:text-base">Our clinic targets complex, recurrent bladder and pelvic symptoms through integrated specialty pathways.</p>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
                        <div class="bg-white p-6 rounded-2xl border border-slate-200/60 shadow-sm">
                            <div class="w-10 h-10 rounded-xl bg-slate-100 text-clinicDarkText flex items-center justify-center font-bold mb-4">01</div>

                            <p class="text-sm text-slate-500 leading-relaxed">Management of persistent, chronic, or recurrent bladder inflammation and resistant urinary tract strains.</p>

                        <div class="bg-white p-6 rounded-2xl border border-slate-200/60 shadow-sm">

                            <h3 class="text-lg font-bold text-clinicDarkText mb-2">Pelvic Floor Dysfunction</h3>
                            <p class="text-sm text-slate-500 leading-relaxed">Targeted physical muscle rehabilitation maps and coordinate diagnostics for functional pelvic structural support issues.</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-200/60 shadow-sm">
                            <div class="w-10 h-10 rounded-xl bg-slate-100 text-clinicDarkText flex items-center justify-center font-bold mb-4">04</div>
                            <h3 class="text-lg font-bold text-clinicDarkText mb-2">Neuropathic Pain Mechanisms</h3>

                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-200/60 shadow-sm">
                            <div class="w-10 h-10 rounded-xl bg-slate-100 text-clinicDarkText flex items-center justify-center font-bold mb-4">06</div>
                            <h3 class="text-lg font-bold text-clinicDarkText mb-2">Coordinated Nurse Triage</h3>
                            <p class="text-sm text-slate-500 leading-relaxed">All patients undergo a foundational initial history mapping assessment with a clinical Nurse Practitioner to optimize referral accuracy.</p>
                        </div>
                    </div>
                </section>
            `,
            '#/pricing': `

                    <div class="text-center mb-12">
                        <span class="text-xs font-bold uppercase tracking-widest text-clinicDarkText bg-white px-3 py-1 rounded-full border border-slate-200">Medicare Outlines</span>
                        <h2 class="text-2xl sm:text-4xl font-extrabold text-clinicDarkText tracking-tight mt-3">Consultation Fees & Rebates</h2>
                        <p class="text-slate-600 mt-2 text-sm sm:text-base">The Bladder Clinic utilizes a structured medical intake tier. Medicare rebates apply to consultations with a valid GP referral letter.</p>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 divide-y divide-slate-100 overflow-hidden">
                        <div class="p-4 sm:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 bg-white">
                            <div>
                                <span class="block font-bold text-slate-800">Initial Nurse Practitioner Assessment</span>
                                <span class="text-xs text-slate-400 block sm:inline">Comprehensive baseline history charting and clinical diagnostic triage mapping.</span>
                            </div>
                            <span class="font-extrabold text-slate-800 text-lg sm:text-xl whitespace-nowrap">$140.00</span>
                        </div>
                        <div class="p-4 sm:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 bg-white">
                            <div>
                                <span class="block font-bold text-slate-800">Senior Consultant Specialist Visit</span>
                                <span class="text-xs text-slate-400 block sm:inline">Direct specialist review across Urology, Gynaecology, or Pain Medicine tracks.</span>
                            </div>
                            <span class="font-extrabold text-slate-800 text-lg sm:text-xl whitespace-nowrap">$295.00</span>
                        </div>
                        <div class="p-4 sm:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 bg-white">
                            <div>
                                <span class="block font-bold text-slate-800">Pelvic Health Physiotherapy Review</span>
                                <span class="text-xs text-slate-400 block sm:inline">Targeted functional assessment and muscle framework mechanics planning.</span>
                            </div>
                            <span class="font-extrabold text-slate-800 text-lg sm:text-xl whitespace-nowrap">$165.00</span>
                        </div>
                        <div class="p-4 sm:p-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 bg-white">
                            <div>
                                <span class="block font-bold text-slate-800">Clinical Psychology Consultation</span>
                                <span class="text-xs text-slate-400 block sm:inline">Evaluating neurological nerve root drivers and somatic adaptation profiles.</span>
                            </div>
                            <span class="font-extrabold text-slate-800 text-lg sm:text-xl whitespace-nowrap">$210.00</span>
                        </div>
                    </div>
                    <div class="mt-6 bg-white/40 rounded-xl p-4 border border-slate-300/60 text-xs text-slate-600 leading-relaxed">
                        <strong>Please Note:</strong> Reduced baseline billing concessions may be applicable for valid Pension or Health Care Card holders upon direct presentation to clinic administration. Veteran's Affairs Gold Card assignments are fully processed under DVA schedules.
                    </div>
                </section>
            `,
            '#/contact': `
                <section class="py-12 px-4 sm:px-6 max-w-7xl mx-auto">
                    <div class="text-center max-w-3xl mx-auto mb-12">
                        <h2 class="text-2xl sm:text-4xl font-extrabold text-clinicDarkText tracking-tight">Contact Our Team</h2>
                        <p class="text-slate-600 mt-2 text-sm sm:text-base">Reach out below to submit a message to our reception desk or locate our facility in Mount Hawthorn.</p>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-start">
                        
                        <div class="lg:col-span-5 space-y-6 sm:space-y-8">
                            <div class="bg-white p-6 rounded-2xl border border-slate-200/60 shadow-sm space-y-4">
                                <h3 class="text-lg font-bold text-clinicDarkText border-b border-slate-100 pb-2">Clinic Operations</h3>
                                
                                <div>
                                    <span class="block text-xs font-bold uppercase text-slate-400">Street Address</span>
                                    <span class="text-sm font-semibold text-slate-700">249 Scarborough Beach Rd, Mount Hawthorn WA 6016</span>
                                </div>
                                
                                <div>
                                    <span class="block text-xs font-bold uppercase text-slate-400">Communication Channels</span>
                                    <span class="text-sm block font-bold text-slate-800">Phone: 08 6555 6516</span>
                                    <span class="text-sm block text-slate-600">Email: emailus@bladder-clinic.com</span>
                                </div>
                                
                                <div>
                                    <span class="block text-xs font-bold uppercase text-slate-400">Standard Consulting Hours</span>
                                    <span class="text-sm block text-slate-700">Monday to Friday: 9:00 AM – 4:00 PM</span>
                                    <span class="text-sm block text-slate-400">Saturday, Sunday & Public Holidays: Closed</span>
                                </div>
                            </div>
                            
                            <div class="w-full h-64 sm:h-80 rounded-2xl overflow-hidden shadow-sm border border-slate-300/60 bg-white">
<iframe 
    src="https://maps.google.com/maps?q=249%20Scarborough%20Beach%20Rd,%20Mount%20Hawthorn%20WA%206016&t=&z=15&ie=UTF-8&iwloc=&output=embed" 
    width="100%" 
    height="100%" 
    style="border:0;" 
    allowfullscreen="" 
    loading="lazy" 
    referrerpolicy="no-referrer-when-downgrade">
</iframe>
                            </div>
                        </div>

                        <div class="lg:col-span-7">
                            <form onsubmit="submitContactForm(event)" class="space-y-6 bg-white p-6 sm:p-8 rounded-2xl border border-slate-200/60 shadow-sm">
                                <input type="hidden" id="form-access-key" value="YOUR_WEB3FORMS_ACCESS_KEY_HERE">

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">Patient Full Name</label>
                                    <input type="text" id="form-name" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:border-slate-400 transition" placeholder="John Doe">
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                                    <input type="email" id="form-email" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:border-slate-400 transition" placeholder="john@example.com">
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">Contact Number</label>
                                    <input type="number" id="form-phone" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:border-slate-400 transition" placeholder="0412345678">
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-2">Message Note</label>
                                    <textarea id="form-message" rows="4" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:border-slate-400 transition" placeholder="Please outline details..."></textarea>
                                </div>
                                
                                <button type="submit" id="form-submit-btn" class="w-full bg-clinicButton text-clinicDarkText py-3 rounded-lg font-bold hover:bg-slate-300 transition shadow-sm border border-slate-300/40">
                                    Send Message Request
                                </button>
                            </form>
                        </div>
                        
                    </div>
                </section>
            `
        };

        function router() {
            let hash = window.location.hash || '#/';
            
            if (!routes[hash]) {
                hash = '#/';
            }

            const container = document.getElementById('app-view');
            
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');
            
            container.innerHTML = routes[hash];

            if (hash === '#/doctors') {
                const grid = document.getElementById('doctors-grid');
                grid.innerHTML = clinicDoctors.map(doc => `
                    <div class="bg-white rounded-2xl border border-slate-200/60 p-6 shadow-sm flex flex-col sm:flex-row gap-6 items-start">
                        <img src="${doc.image}" alt="${doc.name}" class="w-full sm:w-32 h-32 object-cover rounded-xl bg-slate-50 shadow-inner">
                        <div class="flex-grow w-full">
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-500">${doc.title}</span>
                            <h3 class="text-xl font-bold text-clinicDarkText mt-0.5">${doc.name}</h3>
                            <p class="text-xs font-semibold text-slate-400">${doc.degrees}</p>
                            <div class="mt-4 flex flex-wrap gap-1">
                                ${doc.specialties.map(spec => `<span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded">${spec}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Sync Desktop Nav Pill Classes
            document.querySelectorAll('#spa-nav a').forEach(navLink => {
                if (navLink.getAttribute('href') === hash) {
                    navLink.className = "px-4 py-1.5 rounded-full text-sm font-semibold transition text-clinicDarkText bg-white shadow-sm";
                } else {
                    navLink.className = "px-4 py-1.5 rounded-full text-sm font-semibold transition text-slate-600 hover:text-clinicDarkText";
                }
            });

            // Sync Mobile Overlay Dynamic Text Classes
            document.querySelectorAll('#spa-nav-mobile a').forEach(navLink => {
                if (navLink.getAttribute('href') === hash) {
                    navLink.className = "px-4 py-3 rounded-xl text-sm font-bold transition text-clinicDarkText bg-slate-100";
                } else {
                    navLink.className = "px-4 py-3 rounded-xl text-sm font-bold transition text-slate-700 hover:bg-slate-50";
                }
            });
        }

        window.addEventListener("hashchange", router);
        document.addEventListener("DOMContentLoaded", router);
    </script>
</body>
</html>
